<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SEHAI</title>
    <meta name="description" content="Login to access your SEHAI dashboard">
    <link rel="stylesheet" href="styles/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="8" y="16" width="24" height="3" rx="1.5" fill="currentColor" />
                    <rect x="16" y="8" width="3" height="24" rx="1.5" fill="currentColor" />
                    <circle cx="20" cy="20" r="6" stroke="currentColor" stroke-width="2" fill="none" />
                </svg>
                <span class="logo-text">SEHAI</span>
            </div>

            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Login to access your dashboard</p>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="role" class="form-label">Role</label>
                    <div class="select-wrapper">
                        <select id="role" name="role" class="form-select" required>
                            <option value="">Select role</option>
                            <option value="anm">ANM (Sub-Centre)</option>
                            <option value="phc">PHC Doctor</option>
                            <option value="chc">CHC Specialist</option>
                        </select>
                        <svg class="select-icon" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                                clip-rule="evenodd" />
                        </svg>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-input"
                        placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn-primary btn-large btn-full">Login</button>
            </form>

            <div class="auth-footer">
                <a href="#" class="auth-link">Don't have an account? Sign up</a>
                <a href="index.html" class="auth-link-secondary">← Back to Home</a>
            </div>
        </div>

        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="5" />
                <line x1="12" y1="1" x2="12" y2="3" />
                <line x1="12" y1="21" x2="12" y2="23" />
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                <line x1="1" y1="12" x2="3" y2="12" />
                <line x1="21" y1="12" x2="23" y2="12" />
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
            </svg>
            <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
        </button>
    </div>

    <script src="scripts/theme.js"></script>
    <script src="scripts/auth.js"></script>
</body>

</html>
