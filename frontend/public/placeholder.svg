<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Medical Cross with Tech Elements -->
  <rect x="75" y="40" width="50" height="120" rx="8" fill="#00BCD4"/>
  <rect x="40" y="75" width="120" height="50" rx="8" fill="#00BCD4"/>
  
  <!-- Center Circle -->
  <circle cx="100" cy="100" r="25" stroke="#00BCD4" stroke-width="6" fill="white"/>
  
  <!-- Tech Connection Nodes -->
  <circle cx="100" cy="40" r="6" fill="#0097A7"/>
  <circle cx="100" cy="160" r="6" fill="#0097A7"/>
  <circle cx="40" cy="100" r="6" fill="#0097A7"/>
  <circle cx="160" cy="100" r="6" fill="#0097A7"/>
  
  <!-- Circuit Lines -->
  <line x1="100" y1="46" x2="100" y2="75" stroke="#0097A7" stroke-width="2"/>
  <line x1="100" y1="125" x2="100" y2="154" stroke="#0097A7" stroke-width="2"/>
  <line x1="46" y1="100" x2="75" y2="100" stroke="#0097A7" stroke-width="2"/>
  <line x1="125" y1="100" x2="154" y2="100" stroke="#0097A7" stroke-width="2"/>
</svg>
